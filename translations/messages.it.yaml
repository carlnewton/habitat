  what_is_habitat:
    title: "Cos'è Habitat?"
    1: "Habitat è una piattaforma social gratuita e open-source per permettere alle persone di scoprire cosa c'è da vedere e da fare nella loro zona."
    2: "Piccole comunità, come città e villaggi, possono creare le proprie istanze di Habitat per condividere informazioni sui luoghi di interesse locali."
