setup:
  select_language:
    title: "1. Seleziona la tua lingua"
  create_admin_account:
    title: "2. Crea il tuo account amministratore"
    validations:
      generic: "Si è verificato un errore con i tuoi dati, riprova."
  set_location:
    title: "3. Imposta la posizione del tuo Habitat"
    info:
      post_inside_circle: "Gli utenti potranno creare post in qualsiasi posizione all'interno del cerchio."
      global_preferences: "L'impostazione dello zoom della mappa, delle dimensioni del confine e della preferenza di misurazione qui impostata, verrà applicata anche in tutta l'istanza del tuo Habitat."
  add_categories:
    title: "4. Aggiungi alcune categorie"
    suggested_categories:
      sightseeing:
        name: "Luoghi d'interesse"
        description: "Uno spazio per condividere e discutere scoperte visive, punti di riferimento, luoghi naturali, arte di strada, gemme nascoste e altre scoperte uniche nella zona."
      news_events:
        name: "Notizie ed Eventi"
        description: "Post relativi ad aggiornamenti di notizie, eventi, festival, concerti o raduni di comunità."
      food_drink:
        name: "Cibo e Bevande"
        description: "Discussioni e foto di ristoranti, caffè, food truck o piatti speciali."
      history:
        name: "Storia"
        description: "Foto e discussioni specificamente focalizzate sul significato storico, le storie e gli eventi relativi a siti storici locali, edifici o eventi nella zona."
      businesses:
        name: "Attività commerciali"
        description: "Post che promuovono o discutono negozi, boutique o servizi."
      sports_recreation:
        name: "Sport e Tempo Libero"
        description: "Conversazioni su attività all'aperto o strutture ricreative."
      community_initiatives:
        name: "Iniziative comunitarie"
        description: "Post su enti di beneficenza, opportunità di volontariato o progetti comunitari."
      habitat_meta:
        name: "Habitat Meta"
        description: "Discussioni su questa istanza di Habitat."
      random:
        name: "Varie"
        description: "Una categoria generica per vari argomenti che non si adattano a nessun'altra categoria."
    validations:
      empty: "Devi selezionare almeno una categoria. Non preoccuparti, potrai modificarle in seguito."
  image_storage:
    title: "5. Scegli la tua soluzione di archiviazione immagini"
    options:
      local:
        label: "Locale"
        description: "Le immagini verranno archiviate nella directory <code>/uploads</code>. Questa opzione è più semplice da configurare, ma potrebbe essere più difficile e costosa da mantenere a lungo termine quando si esaurisce lo spazio su disco."
      amazon_s3:
        label: "Amazon S3"
        description: "Le immagini verranno archiviate utilizzando Amazon S3 Cloud Object Storage."
    warnings:
      amazon_s3_exception: "Si è verificato un errore durante il tentativo di connessione al bucket S3"
    validations:
      no_option_selected: "Devi scegliere un'opzione di archiviazione immagini"
  configure_mail:
    title: "6. Configura le tue impostazioni di posta"
    test_email_sent: "Un'email di prova è stata inviata a %email_address% e non sono stati segnalati problemi. Se non l'hai ricevuta, controlla le impostazioni qui e riprova."
    warnings:
      test_email_exception: "Si è verificato un problema durante il tentativo di invio di un'email di prova"

